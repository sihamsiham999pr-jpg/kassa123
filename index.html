<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  header {
    height: 60px;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0f121d;
    border-bottom: 1px solid var(--border);
    z-index: 1000;
  }

  .bot-title { font-family: 'Cairo', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--accent); }

  /* منطقة الرسائل - تأخذ المساحة المتبقية ناقصاً حجم شريط الإدخال */
  #messages {
    position: absolute;
    top: 60px;
    bottom: 80px; /* هذه المساحة تضمن عدم تداخل الرسائل مع الأزرار */
    left: 0;
    right: 0;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
    -webkit-overflow-scrolling: touch;
  }

  /* منطقة الإدخال - مثبتة في القاع بقوة */
  #inputArea {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    display: flex;
    align-items: center;
    padding: 0 10px;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 2000; /* لضمان ظهورها فوق كل شيء */
  }

  .controls {
    display: flex;
    gap: 8px;
    width: 100%;
    align-items: center;
  }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
    padding: 10px;
    height: 45px;
    outline: none;
    font-size: 16px;
    resize: none;
  }

  .action-btn {
    height: 45px;
    padding: 0 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; }

  .msg-bubble { padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5; max-width: 85%; }
  .message.user { align-self: flex-start; }
  .message.user .msg-bubble { background: var(--user-bg); color: white; }
  .message.ai { align-self: flex-end; }
  .message.ai .msg-bubble { background: #1a1e2e; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button style="background:none; border:1px solid var(--border); color:var(--accent); padding:5px 10px; border-radius:5px;" onclick="document.getElementById('messages').innerHTML=''">مسح 🗑️</button>
</header>

<div id="messages"></div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="location.reload()">إعادة</button>
    <textarea id="userInput" placeholder="اكتب هنا..." rows="1"></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `أنت يوسف فارسي الروبوت...`; 
const GROQ_KEY = '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';

window.onload = () => {
    addMessage('ai', "مرحبا أنا يوسف فارسي، كيف يمكنني مساعدتك اليوم؟");
};

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: text }]
      })
    });
    const data = await response.json();
    addMessage('ai', data.choices[0].message.content);
  } catch (err) { addMessage('ai', "خطأ في الاتصال بالخادم."); }
}
</script>
</body>
</html>
