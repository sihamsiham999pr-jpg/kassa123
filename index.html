<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
    --input-height: 80px; /* طول منطقة الإدخال التقريبي */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  header {
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 18, 29, 0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 1000;
    flex-shrink: 0;
  }

  .bot-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.75rem;
  }

  /* منطقة الرسائل مع مساحة سفلية إضافية */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: calc(var(--input-height) + 20px); /* ترك مساحة للأزرار الثابتة */
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
  }

  .message { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
  .message.user { align-self: flex-start; }
  .message.ai { align-self: flex-end; }
  .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; }
  .message.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-left-radius: 4px; }
  .message.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-right-radius: 4px; }

  /* تثبيت منطقة الإدخال في القاع تماماً */
  #inputArea {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 10px 15px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 1500;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    max-width: 900px;
    margin: 0 auto;
  }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: white;
    padding: 10px;
    outline: none;
    font-family: inherit;
    resize: none;
    font-size: 16px; /* منع الزوم التلقائي في الآيفون */
  }

  .action-btn {
    height: 42px;
    padding: 0 15px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; font-size: 0.8rem; }

  /* السايد بار */
  #sidebar {
    position: fixed;
    top: 0; right: -280px;
    width: 280px; height: 100%;
    background: #04060b;
    border-left: 1px solid var(--border);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
  }
  #sidebar.open { right: 0; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button class="nav-btn" onclick="toggleSidebar()">السجل 📜</button>
</header>

<aside id="sidebar">
  <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;">
    <span>أحدث 20 محادثة</span>
    <button class="nav-btn" onclick="toggleSidebar()">✕</button>
  </div>
  <div id="historyList" style="overflow-y:auto; height:90%;"></div>
</aside>

<div id="messages"></div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="clearMessages()">حذف</button>
    <textarea id="userInput" placeholder="اسألني..." rows="1"></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `أنت يوسف فارسي الروبوت...`; // نفس البرومبت الخاص بك
const GROQ_KEY = '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';
let chatHistory = [];

window.onload = () => {
    const aiDiv = addMessage('ai', '');
    typeWriter(aiDiv.querySelector('.msg-bubble'), "مرحبا أنا يوسف فارسي هنا لمساعدتك تفضل بالسؤال");
};

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function typeWriter(element, text) {
  let i = 0; element.innerHTML = "";
  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i++);
      setTimeout(type, 20);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }
  type();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';

  const aiDiv = addMessage('ai', '...');
  const bubble = aiDiv.querySelector('.msg-bubble');

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory, { role: 'user', content: text }]
      })
    });
    const data = await response.json();
    const reply = data.choices[0].message.content;
    typeWriter(bubble, reply);
    chatHistory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
  } catch (err) { bubble.innerHTML = "خطأ."; }
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function clearMessages() { document.getElementById('messages').innerHTML = ''; chatHistory = []; }

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
