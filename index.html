
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Cairo:wght@900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  header {
    height: 60px;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0f121d;
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .bot-title { font-family: 'Cairo', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--accent); }

  #messages {
    flex-grow: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 100px; /* مساحة أمان للأزرار */
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
    -webkit-overflow-scrolling: touch;
  }

  #inputArea {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 2000;
  }

  .controls { display: flex; gap: 8px; width: 100%; align-items: center; max-width: 800px; margin: auto; }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
    padding: 10px;
    height: 45px;
    outline: none;
    font-size: 16px;
    resize: none;
  }

  .action-btn {
    height: 45px;
    padding: 0 15px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; }

  .msg-bubble { padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; max-width: 85%; word-wrap: break-word; }
  .message.user { align-self: flex-start; }
  .message.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-left-radius: 2px; }
  .message.ai { align-self: flex-end; }
  .message.ai .msg-bubble { background: #1a1e2e; border: 1px solid var(--border); border-bottom-right-radius: 2px; }

  /* تأثير الوميض أثناء الكتابة */
  .typing::after { content: '|'; animation: blink 0.7s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button style="background:none; border:1px solid var(--border); color:var(--accent); padding:5px 10px; border-radius:5px;" onclick="document.getElementById('messages').innerHTML=''">مسح 🗑️</button>
</header>

<div id="messages"></div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="location.reload()">إعادة</button>
    <textarea id="userInput" placeholder="اسأل عن يوسف فارسي..." rows="1"></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
// البرومبت يحتوي على كافة المعلومات الشخصية بدقة
const SYSTEM_PROMPT = `أنت "روبوت يوسف فارسي". مبرمجك هو يوسف فارسي.
معلومات المبرمج يوسف فارسي (أجب عنها فقط إذا سُئلت عن كل نقطة بحد ذاتها):
- المولد: 10 نوفمبر 1988 في الشريعة، ولاية تبسة.
- السكن: بلدية الشريعة، ولاية تبسة، حي هنشير عجلة.
- الوالدين: الأب بلقاسم فارسي، الأم فاطمة تونسي.
- المهن والخبرات: مبرمج، رسام، خبير تربية الحيوانات الصغيرة، خبير دواجن.
- الصفات: ذكي، رياضي يحب الجري.
تعليمات: لا تقدم كل المعلومات دفعة واحدة. أجب حرفياً على قدر السؤال فقط.`;

const GROQ_KEY = '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';
let chatHistory = [];

window.onload = () => {
    addMessage('ai', "مرحبا أنا يوسف فارسي، كيف يمكنني مساعدتك اليوم؟");
};

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="msg-bubble ${role === 'ai' ? 'typing' : ''}"></div>`;
  container.appendChild(div);
  
  const bubble = div.querySelector('.msg-bubble');
  
  if (role === 'ai' && text !== "") {
    typeWriter(bubble, text);
  } else {
    bubble.innerText = text;
    bubble.classList.remove('typing');
  }
  
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function typeWriter(element, text) {
  let i = 0;
  element.innerHTML = "";
  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i++);
      setTimeout(type, 30); // سرعة الكتابة
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    } else {
      element.classList.remove('typing');
    }
  }
  type();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory, { role: 'user', content: text }]
      })
    });
    
    const data = await response.json();
    const reply = data.choices[0].message.content;
    
    addMessage('ai', reply);
    chatHistory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
    if(chatHistory.length > 20) chatHistory.shift(); // مسح المحادثات القديمة تلقائياً

  } catch (err) { 
    addMessage('ai', "خطأ في الاتصال. تأكد من الإنترنت."); 
  }
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
