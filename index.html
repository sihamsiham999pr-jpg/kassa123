<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* الهيدر مع زر المحادثات السابقة */
  header {
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 18, 29, 0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 1000;
  }

  .bot-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
  }

  /* القائمة الجانبية المنزلقة */
  #sidebar {
    position: fixed;
    top: 0; right: -280px;
    width: 280px; height: 100%;
    background: #04060b;
    border-left: 1px solid var(--border);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  #sidebar.open { right: 0; }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .history-list { overflow-y: auto; flex: 1; }
  .history-card {
    background: var(--surface);
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* منطقة الرسائل */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
  }

  .message { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  
  .message.user { align-self: flex-start; }
  .message.ai { align-self: flex-end; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .message.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-left-radius: 4px; }
  .message.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-right-radius: 4px; }

  /* التحكم السفلي */
  #inputArea {
    padding: 15px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .controls {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
    align-items: center;
  }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: white;
    padding: 12px;
    outline: none;
    font-family: 'Tajawal', sans-serif;
    resize: none;
  }

  .action-btn {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; }

  .typing::after { content: '...'; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button class="nav-btn" onclick="toggleSidebar()">المحادثات السابقة 📜</button>
</header>

<aside id="sidebar">
  <div class="history-header">
    <span>السجل (أحدث 20)</span>
    <button class="nav-btn" onclick="toggleSidebar()">إغلاق ✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</aside>

<div id="messages"></div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="clearMessages()">حذف</button>
    <textarea id="userInput" placeholder="تفضل بالسؤال..." rows="1"></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `أنت يوسف فارسي الروبوت. الشخص الذي برمجك هو يوسف فارسي. 
أجب عن المولد (الشريعة، تبسة، الجزائر)، الوالدين (بلقاسم قاصة، تونسى فاطمة)، الإخوة (6 ذكور هو السابع، أخت صغرى بسمة)، والعمل (مبرمج وخبير دواجن) فقط عند السؤال عن كل نقطة بحد ذاتها.`;

const GROQ_KEY = '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';
let chatHistory = [];
const LIMIT = 20;

// ترحيب تلقائي عند الفتح
window.onload = () => {
    const aiDiv = addMessage('ai', '');
    typeWriter(aiDiv.querySelector('.msg-bubble'), "مرحبا أنا يوسف فارسي هنا لمساعدتك تفضل بالسؤال");
};

function typeWriter(element, text) {
  let i = 0;
  element.innerHTML = "";
  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }
  type();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';
  updateSidebar(text);

  const aiDiv = addMessage('ai', '');
  const bubble = aiDiv.querySelector('.msg-bubble');
  bubble.classList.add('typing');

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory, { role: 'user', content: text }]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;
    
    bubble.classList.remove('typing');
    typeWriter(bubble, reply);
    chatHistory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });

  } catch (err) { bubble.innerHTML = "خطأ في الاتصال."; }
}

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function updateSidebar(text) {
  const list = document.getElementById('historyList');
  const items = list.getElementsByClassName('history-card');
  if (items.length >= LIMIT) { list.removeChild(items[items.length - 1]); }
  const card = document.createElement('div');
  card.className = 'history-card';
  card.innerText = text;
  list.prepend(card);
}

function clearMessages() {
  document.getElementById('messages').innerHTML = '';
  chatHistory = [];
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
