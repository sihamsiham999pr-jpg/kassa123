<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #05070a; --surface: #0f121d; --accent: #00ccaa; --text: #e8edf5; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #0f121d; border-bottom: 1px solid rgba(0,255,204,0.2); }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.6; font-size: 0.95rem; }
  .user { align-self: flex-start; background: linear-gradient(135deg, #008b8b, #00ccaa); color: white; }
  .ai { align-self: flex-end; background: var(--surface); border: 1px solid rgba(0,255,204,0.2); }
  #status-bar { font-size: 0.7rem; color: var(--accent); text-align: center; padding: 5px; background: rgba(0,0,0,0.5); }
  #inputArea { padding: 15px; background: var(--surface); border-top: 1px solid rgba(0,255,204,0.2); display: flex; gap: 10px; }
  #userInput { flex: 1; background: #05070a; border: 1px solid var(--accent); border-radius: 10px; color: white; padding: 10px; outline: none; }
  .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  #sendBtn { background: var(--accent); color: #05070a; }
</style>
</head>
<body>

<header>
  <div style="font-weight: 900; color: var(--accent);">يوسف فارسي</div>
  <button onclick="clearChat()" style="background:none; border:none; color:#ff5555; font-size:0.8rem;">مسح</button>
</header>

<div id="messages"></div>
<div id="status-bar">جاري التحميل...</div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="اسأل يوسف فارسي..." disabled>
  <button id="sendBtn" class="btn" onclick="sendMessage()" disabled>إرسال</button>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

let pipe;
const log = document.getElementById('status-bar');
const input = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');

// معلوماتك الشخصية
const MY_BIO = "يوسف فارسي من الشريعة، تبسة، الجزائر. مبرمج ومطور. والده بلقاسم (قاصة) ووالدته تونسى فاطمة.";

(async () => {
    try {
        // استخدام أخف نموذج ممكن لضمان العمل على الهواتف
        pipe = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
            progress_callback: (d) => {
                if(d.status === 'progress') log.innerText = `جاري التحميل: ${d.progress.toFixed(0)}%`;
                if(d.status === 'ready') {
                    log.innerText = "● جاهز للعمل محلياً";
                    input.disabled = false; btn.disabled = false;
                    addMsg('ai', "مرحبا أنا يوسف فارسي هنا لمساعدتك تفضل بالسؤال");
                }
            }
        });
    } catch (e) { log.innerText = "فشل التحميل، يرجى تحديث الصفحة."; }
})();

window.sendMessage = async () => {
    const text = input.value.trim();
    if (!text) return;
    
    addMsg('user', text);
    input.value = '';
    const aiDiv = addMsg('ai', 'جاري التفكير...');

    try {
        const res = await pipe(`${MY_BIO} سؤال: ${text} إجابة باختصار:`, { max_new_tokens: 50 });
        aiDiv.innerText = res[0].generated_text;
    } catch (e) { aiDiv.innerText = "حدث خطأ في المعالجة."; }
};

function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerText = text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 99999;
    return div;
}

window.clearChat = () => { document.getElementById('messages').innerHTML = ''; };
</script>
</body>
</html>
