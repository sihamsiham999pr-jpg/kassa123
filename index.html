<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Cairo:wght@900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
    --border: rgba(0, 255, 204, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    height: 60px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    flex-shrink: 0;
    z-index: 1001;
  }

  .bot-title { font-family: 'Cairo', sans-serif; font-size: 1.1rem; color: var(--accent); }

  #sidebar {
    position: fixed;
    top: 0; right: -280px;
    width: 280px; height: 100%;
    background: #080a12;
    border-left: 1px solid var(--border);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
  }
  #sidebar.active { right: 0; }
  .history-item {
    background: var(--surface);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 0.85rem;
    border: 1px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #messages {
    flex-grow: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
    padding-bottom: 110px;
  }

  #inputArea {
    position: fixed;
    bottom: 0; width: 100%;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 1000;
  }

  .controls { display: flex; gap: 8px; align-items: center; max-width: 800px; margin: auto; }

  #userInput {
    flex: 1; height: 45px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: white; padding: 10px; font-size: 16px; outline: none; resize: none;
  }

  .btn { height: 40px; padding: 0 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-family: inherit; }
  #sendBtn { background: var(--accent); color: #05070a; }
  
  .copy-btn {
    background: rgba(0, 204, 170, 0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 5px;
    align-self: flex-end;
    cursor: pointer;
  }

  .msg-bubble { 
    padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; max-width: 85%; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .message { display: flex; flex-direction: column; }
  .message.user { align-items: flex-start; }
  .message.user .msg-bubble { background: var(--user-bg); color: white; }
  .message.ai { align-items: flex-end; }
  .message.ai .msg-bubble { background: #1a1e2e; border: 1px solid var(--border); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button style="background:transparent; border:1px solid var(--accent); color:var(--accent);" class="btn" onclick="toggleSidebar()">السجل 📜</button>
</header>

<aside id="sidebar">
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h3 style="color:var(--accent)">المحادثات</h3>
    <button class="btn" style="background:none; color:white;" onclick="toggleSidebar()">✕</button>
  </div>
  <div id="historyList"></div>
</aside>

<div id="messages"></div>

<div id="inputArea">
  <div class="controls">
    <button class="btn" style="background:#ff4d4d22; color:#ff4d4d;" onclick="location.reload()">جديد</button>
    <textarea id="userInput" placeholder="اسأل عن يوسف فارسي..."></textarea>
    <button id="sendBtn" class="btn" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `أنت "روبوت يوسف فارسي". مبرمجك هو يوسف فارسي. 
معلومات المبرمج يوسف فارسي (أجب عنها فقط إذا سُئلت عن كل نقطة بحد ذاتها):
- المولد: 10 نوفمبر 1988 في الشريعة، ولاية تبسة.
- السكن: بلدية الشريعة، ولاية تبسة، حي هنشير عجلة.
- الوالدين: الأب بلقاسم فارسي، الأم فاطمة تونسي.
- المهن والخبرات: مبرمج، رسام، خبير تربية الحيوانات الصغيرة، خبير دواجن.
- الصفات: ذكي، رياضي يحب الجري.
تعليمات: لا تقدم كل المعلومات دفعة واحدة. أجب حرفياً على قدر السؤال فقط.`;

// ربط الـ API الخاص بـ Groq
const GROQ_KEY = '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';

let allChats = JSON.parse(localStorage.getItem('farsi_chats') || '[]');
let currentChat = [];

window.onload = () => {
    addMessage('ai', "مرحبا أنا يوسف فارسي، تفضل بسؤالك.");
    updateSidebarUI();
};

function addMessage(role, text, isHistory = false) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  
  let html = `<div class="msg-bubble"></div>`;
  if (role === 'ai') {
    html += `<button class="copy-btn" onclick="copyText(this)">نسخ 📋</button>`;
  }
  div.innerHTML = html;
  container.appendChild(div);
  
  const bubble = div.querySelector('.msg-bubble');
  if (role === 'ai' && !isHistory) {
    typeWriter(bubble, text);
  } else {
    bubble.textContent = text;
  }
  container.scrollTop = container.scrollHeight;
}

function typeWriter(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      element.textContent += text.charAt(i++);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    } else {
      clearInterval(interval);
    }
  }, 25);
}

function copyText(btn) {
  const text = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const originalText = btn.textContent;
    btn.textContent = "تم النسخ! ✅";
    setTimeout(() => btn.textContent = originalText, 2000);
  });
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  currentChat.push({ role: 'user', content: text });
  input.value = '';

  try {
    // تنفيذ الطلب إلى Groq Cloud
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json', 
        'Authorization': `Bearer ${GROQ_KEY}` 
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...currentChat]
      })
    });
    const data = await response.json();
    const reply = data.choices[0].message.content;
    
    addMessage('ai', reply);
    currentChat.push({ role: 'assistant', content: reply });
    saveToHistory();
  } catch (err) { 
    addMessage('ai', "حدث خطأ في الاتصال بـ Groq API."); 
  }
}

function saveToHistory() {
    if (allChats.length === 0 || (allChats.length > 0 && currentChat.length <= 2)) {
        if (currentChat.length === 2) allChats.push([...currentChat]);
    } else {
        allChats[allChats.length - 1] = [...currentChat];
    }
    if (allChats.length > 10) allChats.shift();
    localStorage.setItem('farsi_chats', JSON.stringify(allChats));
    updateSidebarUI();
}

function updateSidebarUI() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    allChats.forEach((chat, index) => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = `محادثة ${index + 1}: ${chat[0] ? chat[0].content : "..."}`;
        item.onclick = () => loadChat(index);
        list.appendChild(item);
    });
}

function loadChat(index) {
    document.getElementById('messages').innerHTML = '';
    currentChat = [...allChats[index]];
    currentChat.forEach(msg => {
        addMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, true);
    });
    toggleSidebar();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
</script>
</body>
</html>
