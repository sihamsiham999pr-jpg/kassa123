<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>يوسف — مساعدك الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f1a;
    --surface: #141827;
    --surface2: #1c2235;
    --border: rgba(99,179,255,0.12);
    --accent: #4f9eff;
    --accent2: #7c3aed;
    --text: #e8edf5;
    --text-muted: #7a8aa0;
    --user-bg: linear-gradient(135deg, #4f9eff, #7c3aed);
    --ai-bg: #1c2235;
    --green: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    background: rgba(20,24,39,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    z-index: 10;
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f9eff, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 0 20px rgba(79,158,255,0.4);
    flex-shrink: 0;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 2px;
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px var(--green);
  }
  .header-info h1 {
    font-family: 'Cairo', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    background: linear-gradient(135deg, #e8edf5, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-info p { font-size: 0.75rem; color: var(--green); font-weight: 500; }
  .header-badge {
    margin-right: auto;
    padding: 4px 12px;
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 20px;
    font-size: 0.7rem;
    color: var(--accent);
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  .message {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    max-width: 85%;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .message.user { align-self: flex-start; flex-direction: row-reverse; }
  .message.ai { align-self: flex-end; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; margin-top: 2px;
  }
  .message.user .msg-avatar { background: linear-gradient(135deg, #4f9eff, #7c3aed); }
  .message.ai .msg-avatar { background: linear-gradient(135deg, #7c3aed, #4f9eff); }
  .msg-content { display: flex; flex-direction: column; gap: 4px; }
  .msg-name { font-size: 0.72rem; color: var(--text-muted); padding: 0 4px; }
  .message.user .msg-name { text-align: right; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 18px;
    font-size: 0.95rem; line-height: 1.7;
    word-break: break-word;
  }
  .message.user .msg-bubble {
    background: var(--user-bg); color: white;
    border-radius: 18px 4px 18px 18px;
    box-shadow: 0 4px 20px rgba(79,158,255,0.25);
  }
  .message.ai .msg-bubble {
    background: var(--ai-bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
  }
  .msg-time { font-size: 0.65rem; color: var(--text-muted); padding: 0 4px; }
  .message.user .msg-time { text-align: right; }
  .typing-bubble { display: flex; align-items: center; gap: 6px; padding: 14px 18px; }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--accent); border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; background: #9b7fff; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .welcome { text-align: center; padding: 40px 20px; animation: fadeIn 0.6s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .welcome-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #4f9eff, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; margin: 0 auto 16px;
    box-shadow: 0 0 40px rgba(79,158,255,0.4);
    animation: pulse 3s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(79,158,255,0.4); }
    50% { box-shadow: 0 0 60px rgba(79,158,255,0.6); }
  }
  .welcome h2 {
    font-family: 'Cairo', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;
    background: linear-gradient(135deg, #e8edf5, #4f9eff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .welcome p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; max-width: 300px; margin: 0 auto 24px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 360px; margin: 0 auto; }
  .suggestion-btn {
    padding: 8px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-muted); font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .suggestion-btn:hover {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.3);
    color: var(--accent); transform: translateY(-2px);
  }
  #inputArea {
    padding: 16px 20px;
    background: rgba(20,24,39,0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: rgba(79,158,255,0.4);
    box-shadow: 0 0 20px rgba(79,158,255,0.1);
  }
  #userInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem; resize: none; max-height: 120px; line-height: 1.5;
  }
  #userInput::placeholder { color: var(--text-muted); }
  #sendBtn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #4f9eff, #7c3aed);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: white; flex-shrink: 0;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(79,158,255,0.3);
  }
  #sendBtn:hover { transform: scale(1.08); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .input-hint { text-align: center; font-size: 0.68rem; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>يوسف</h1>
    <p>● متصل الآن</p>
  </div>
  <div class="header-badge">ذكاء اصطناعي</div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-avatar">🤖</div>
    <h2>مرحباً، أنا يوسف!</h2>
    <p>مساعدك الذكي الشخصي. اسألني أي شيء وسأكون سعيداً بمساعدتك.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest('من أنت؟')">من أنت؟</button>
      <button class="suggestion-btn" onclick="suggest('ساعدني في كتابة رسالة')">كتابة رسالة ✍️</button>
      <button class="suggestion-btn" onclick="suggest('اشرح لي الذكاء الاصطناعي ببساطة')">اشرح الذكاء الاصطناعي 🧠</button>
      <button class="suggestion-btn" onclick="suggest('احكِ لي نكتة')">نكتة 😄</button>
      <button class="suggestion-btn" onclick="suggest('ما هي نصائحك لتعلم البرمجة؟')">تعلم البرمجة 💻</button>
    </div>
  </div>
</div>

<div id="inputArea">
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="اكتب رسالتك ليوسف..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">اضغط Enter للإرسال • Shift+Enter لسطر جديد</div>
</div>

<script>
const SYSTEM_PROMPT = `أنت يوسف، مساعد ذكاء اصطناعي ودود وذكي يتحدث العربية بطلاقة.
شخصيتك: دافئ، متحمس، مفيد، ظريف أحياناً.
تجيب بشكل واضح ومنظم. تستخدم الإيموجي بشكل معتدل.
اسمك يوسف فقط. ردودك دائماً بالعربية إلا إذا طُلب غير ذلك.`;

const GROQ_KEY = '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';
let history = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const isUser = role === 'user';
  div.innerHTML = `
    <div class="msg-avatar">${isUser ? '👤' : '🤖'}</div>
    <div class="msg-content">
      <div class="msg-name">${isUser ? 'أنت' : 'يوسف'}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="msg-name">يوسف</div>
      <div class="msg-bubble">
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function suggest(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1024,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await response.json();
    removeTyping();
    const reply = data.choices?.[0]?.message?.content || 'عذراً، لم أتمكن من الرد.';
    history.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);

  } catch (err) {
    removeTyping();
    addMessage('ai', 'خطأ في الاتصال: ' + err.message);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
