<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>يوسف فارسي — مساعدك المحلي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    /* استخدام dvh لضمان التوافق مع شريط كروم على الهاتف */
    height: 100vh;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: env(safe-area-inset-top) 15px 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 18, 29, 0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }

  .bot-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
  }

  .nav-btn {
    background: rgba(0, 204, 170, 0.1);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
    /* تحسين السكرول على كروم موبايل */
    -webkit-overflow-scrolling: touch;
  }

  .message { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
  .message.user { align-self: flex-start; }
  .message.ai { align-self: flex-end; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 15px;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .message.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-left-radius: 2px; }
  .message.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-right-radius: 2px; }

  #status-bar {
    background: rgba(0, 0, 0, 0.4);
    color: var(--accent);
    text-align: center;
    font-size: 0.7rem;
    padding: 5px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* منطقة الإدخال المعدلة لتظهر فوق شريط المتصفح */
  #inputArea {
    padding: 10px 15px calc(10px + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    max-width: 100%;
    align-items: center;
  }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: white;
    padding: 10px;
    outline: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px; /* منع التكبير التلقائي في آيفون/كروم */
    resize: none;
    max-height: 80px;
  }

  .action-btn {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: rgba(255, 77, 77, 0.15); color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.3); }

  /* القائمة الجانبية */
  #sidebar {
    position: fixed;
    top: 0; right: -100%;
    width: 80%; max-width: 280px; height: 100%;
    background: #04060b;
    border-left: 1px solid var(--border);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
  }
  #sidebar.open { right: 0; }

  .history-card {
    background: var(--surface);
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 6px;
    font-size: 0.75rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .typing::after { content: '...'; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button class="nav-btn" onclick="toggleSidebar()">المحادثات السابقة 📜</button>
</header>

<aside id="sidebar">
  <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;">
    <span>السجل (أحدث 20)</span>
    <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.2rem;">✕</button>
  </div>
  <div id="historyList"></div>
</aside>

<div id="messages"></div>

<div id="status-bar">جاري فحص المتصفح...</div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="clearMessages()">حذف</button>
    <textarea id="userInput" placeholder="انتظر التحميل..." rows="1" disabled></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()" disabled>إرسال</button>
  </div>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

let generator;
const LIMIT = 20;
const loadStatus = document.getElementById('status-bar');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

const PERSON_DATA = `يوسف فارسي من الشريعة، تبسة، الجزائر. والده بلقاسم (قاصة) ووالدته تونسى فاطمة. لديه 6 إخوة ذكور وهو السابع وأخت بسمة. هو مبرمج وخبير دواجن.`;

(async () => {
    try {
        generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
            progress_callback: (data) => {
                if (data.status === 'progress') {
                    loadStatus.innerText = `جاري التحميل: ${data.progress.toFixed(1)}%`;
                } else if (data.status === 'ready') {
                    loadStatus.innerText = "● الذكاء الاصطناعي جاهز ويعمل محلياً 100%";
                    userInput.disabled = false;
                    userInput.placeholder = "تفضل بالسؤال...";
                    sendBtn.disabled = false;
                }
            }
        });
        showWelcome();
    } catch (e) {
        loadStatus.innerText = "خطأ في التحميل. يرجى تحديث الصفحة.";
    }
})();

window.sendMessage = async () => {
    const text = userInput.value.trim();
    if (!text || !generator) return;

    addMessage('user', text);
    userInput.value = '';
    updateSidebar(text);

    const aiDiv = addMessage('ai', 'جاري التفكير...');
    const bubble = aiDiv.querySelector('.msg-bubble');
    bubble.classList.add('typing');

    try {
        const fullPrompt = `${PERSON_DATA}\nسؤال: ${text}\nإجابة مختصرة:`;
        const output = await generator(fullPrompt, { max_new_tokens: 100, temperature: 0.5 });
        bubble.classList.remove('typing');
        typeWriter(bubble, output[0].generated_text);
    } catch (err) {
        bubble.innerText = "خطأ محلي.";
    }
};

function showWelcome() {
    const aiDiv = addMessage('ai', '');
    typeWriter(aiDiv.querySelector('.msg-bubble'), "مرحبا أنا يوسف فارسي هنا لمساعدتك تفضل بالسؤال");
}

function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function typeWriter(element, text) {
    let i = 0; element.innerHTML = "";
    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i); i++;
            setTimeout(type, 20);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    }
    type();
}

function updateSidebar(text) {
    const list = document.getElementById('historyList');
    if (list.children.length >= LIMIT) list.removeChild(list.lastChild);
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerText = text;
    list.prepend(card);
}

window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
window.clearMessages = () => { document.getElementById('messages').innerHTML = ''; showWelcome(); };

userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
});
</script>
</body>
</html>
