<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>يوسف فارسي — مساعدك المحلي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --surface: #0f121d;
    --border: rgba(0, 255, 204, 0.3);
    --accent: #00ccaa; 
    --text: #e8edf5;
    --user-bg: linear-gradient(135deg, #008b8b, #00ccaa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 18, 29, 0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 1000;
  }

  .bot-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
  }

  #sidebar {
    position: fixed;
    top: 0; right: -280px;
    width: 280px; height: 100%;
    background: #04060b;
    border-left: 1px solid var(--border);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  #sidebar.open { right: 0; }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .history-list { overflow-y: auto; flex: 1; }
  .history-card {
    background: var(--surface);
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: radial-gradient(circle at center, #0f1425 0%, #05070a 100%);
  }

  .message { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  
  .message.user { align-self: flex-start; }
  .message.ai { align-self: flex-end; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .message.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-left-radius: 4px; }
  .message.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-right-radius: 4px; }

  #inputArea {
    padding: 15px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .controls {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
    align-items: center;
  }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: white;
    padding: 12px;
    outline: none;
    font-family: 'Tajawal', sans-serif;
    resize: none;
  }

  .action-btn {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  #sendBtn { background: var(--accent); color: #05070a; }
  #clearBtn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; }

  #status-bar {
    background: rgba(0, 255, 204, 0.05);
    color: var(--accent);
    text-align: center;
    font-size: 0.75rem;
    padding: 8px;
    border-top: 1px solid var(--border);
  }

  .typing::after { content: '...'; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="bot-title">يوسف فارسي</div>
  <button class="nav-btn" onclick="toggleSidebar()">المحادثات السابقة 📜</button>
</header>

<aside id="sidebar">
  <div class="history-header">
    <span>السجل (أحدث 20)</span>
    <button class="nav-btn" onclick="toggleSidebar()">إغلاق ✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</aside>

<div id="messages"></div>

<div id="status-bar" id="loadStatus">جاري فحص المتصفح...</div>

<div id="inputArea">
  <div class="controls">
    <button id="clearBtn" class="action-btn" onclick="clearMessages()">حذف</button>
    <textarea id="userInput" placeholder="انتظر تحميل الذكاء..." rows="1" disabled></textarea>
    <button id="sendBtn" class="action-btn" onclick="sendMessage()" disabled>إرسال</button>
  </div>
</div>

<script type="module">
// استدعاء مكتبة التشغيل المحلي من Hugging Face
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

let generator;
const LIMIT = 20;
const loadStatus = document.getElementById('status-bar');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// معلومات المبرمج يوسف فارسي المخزنة محلياً
const PERSON_DATA = `
معلومات عن يوسف فارسي (المبرمج):
- المولد: ولد في مدينة الشريعة، ولاية تبسة، الجزائر.
- العائلة: والده بلقاسم (المدعو قاصة) ووالدته تونسى فاطمة.
- الإخوة: لديه 6 إخوة ذكور وهو السابع، وأخت واحدة صغرى اسمها بسمة.
- الخبرة: مبرمج تطبيقات ومطور ذكاء اصطناعي، وخبير في قطاع الدواجن.
`;

// 1. تحميل النموذج مع إظهار نسبة التنزيل
(async () => {
    try {
        loadStatus.innerText = "بدء التنزيل... يرجى الانتظار (يحدث مرة واحدة فقط)";
        
        // استخدام نموذج صغير وفعال للعمل على الهواتف
        generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
            progress_callback: (data) => {
                if (data.status === 'progress') {
                    loadStatus.innerText = `جاري تنزيل "عقل" الروبوت: ${data.progress.toFixed(2)}%`;
                } else if (data.status === 'ready') {
                    loadStatus.innerText = "● الذكاء الاصطناعي جاهز ويعمل محلياً 100%";
                    userInput.disabled = false;
                    userInput.placeholder = "تفضل بالسؤال...";
                    sendBtn.disabled = false;
                }
            }
        });
        
        showWelcome();
    } catch (e) {
        loadStatus.innerText = "خطأ: تأكد من استخدام متصفح حديث واتصال بالإنترنت للتحميل الأول.";
    }
})();

window.sendMessage = async () => {
    const text = userInput.value.trim();
    if (!text || !generator) return;

    addMessage('user', text);
    userInput.value = '';
    updateSidebar(text);

    const aiDiv = addMessage('ai', 'جاري التفكير محلياً...');
    const bubble = aiDiv.querySelector('.msg-bubble');
    bubble.classList.add('typing');

    try {
        // دمج تعليمات المبرمج مع سؤال المستخدم
        const fullPrompt = `${PERSON_DATA}\nسؤال المستخدم: ${text}\nأجب باختصار وعلى قدر السؤال فقط:`;
        
        const output = await generator(fullPrompt, { 
            max_new_tokens: 150, 
            temperature: 0.5,
            repetition_penalty: 1.2
        });
        
        bubble.classList.remove('typing');
        typeWriter(bubble, output[0].generated_text);
    } catch (err) {
        bubble.innerText = "عذراً، حدث خطأ في المعالجة المحلية.";
    }
};

function showWelcome() {
    const aiDiv = addMessage('ai', '');
    typeWriter(aiDiv.querySelector('.msg-bubble'), "مرحبا أنا يوسف فارسي هنا لمساعدتك تفضل بالسؤال");
}

function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function typeWriter(element, text) {
    let i = 0; element.innerHTML = "";
    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i); i++;
            setTimeout(type, 20);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    }
    type();
}

function updateSidebar(text) {
    const list = document.getElementById('historyList');
    const items = list.getElementsByClassName('history-card');
    if (items.length >= LIMIT) { list.removeChild(items[items.length - 1]); }
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerText = text;
    list.prepend(card);
}

window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
window.clearMessages = () => { document.getElementById('messages').innerHTML = ''; showWelcome(); };

userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
